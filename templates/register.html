{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLine Medical Center - Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --bg-color: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-color);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .auth-container {
            background: white; width: 450px; padding: 40px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative;
        }

        .brand-header { text-align: center; margin-bottom: 25px; }
        .brand-header h1 { color: var(--secondary-color); font-size: 26px; }
        .brand-header h1 span { color: var(--primary-color); }
        
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group i {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: #bdc3c7;
        }

        .input-group input {
            width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ddd;
            border-radius: 8px; outline: none; transition: 0.3s;
        }

        .input-group input:focus { border-color: var(--primary-color); }

        .submit-btn {
            width: 100%; padding: 14px; background: var(--primary-color); border: none;
            border-radius: 8px; color: white; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .submit-btn:hover { background: #2980b9; transform: translateY(-2px); }

        .error-message {
            background: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px;
            margin-bottom: 20px; font-size: 13px; text-align: center;
        }

        .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #7f8c8d; }
        .auth-footer a { color: var(--primary-color); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="brand-header">
        <h1>LifeLine <span>Medical</span></h1>
        <p style="font-size: 13px; color: #7f8c8d;">Create a new staff account</p>
    </div>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="full_name" placeholder="Full Name" required>
        </div>

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="Email Address" required>
        </div>

        <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="text" name="contact" placeholder="Contact Number">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="submit-btn">
            Create Account <i class="fas fa-arrow-right"></i>
        </button>
    </form>

    <div class="auth-footer">
        Already registered? <a href="{% url 'login' %}">Sign in here</a>
    </div>
</div>

</body>
</html>
