{% extends 'base.html' %}

{% block content %}
<style>
    /* Sabse important: Is value ko kam karke dekho */
    .appointment-wrapper {
        margin-left: 0px; /* Agar abhi bhi right mein hai, toh ise 200px ya 180px karke dekho */
        padding: 30px;
        background: #f8f9fa;
        min-height: 100vh;
        display: block; /* Flex hata diya taaki center na ho */
    }

    .appointment-container {
        width: 100%;
        max-width: 1000px; /* Isse zyada bada nahi hoga */
        margin-left: 0; /* Ekdum left se start hoga */
    }

    /* Timeline styling baki wahi rahegi */
    .timeline {
        position: relative;
        padding: 20px 0;
        margin-left: 10px;
    }

    .timeline::after {
        content: '';
        position: absolute;
        width: 4px;
        background-color: #dee2e6;
        top: 0;
        bottom: 0;
        left: 31px;
    }

    .timeline-item {
        padding: 10px 0 10px 40px;
        position: relative;
        margin-bottom: 20px;
    }

    .timeline-item::after {
        content: '';
        position: absolute;
        width: 18px;
        height: 18px;
        left: 22px;
        background-color: white;
        border: 4px solid #3498db;
        top: 25px;
        border-radius: 50%;
        z-index: 1;
    }

    .timeline-content {
        padding: 20px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 5px solid #3498db;
    }
</style>

<div class="appointment-wrapper">
    <div class="appointment-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="margin: 0;">📅 Appointment Timeline</h2>
            <a href="{% url 'add_appointment' %}" style="background: #3498db; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold;">
                + New Appointment
            </a>
        </div>

        <div class="timeline">
            {% for appt in appointments %}
            <div class="timeline-item">
                <div class="timeline-content">
                    <div>
                        <span style="color: #3498db; font-weight: bold;">⏰ {{ appt.time|time:"h:i A" }}</span>
                        <h3 style="margin: 5px 0;">{{ appt.patient_name }}</h3>
                        <p style="margin: 0; color: #666;">Doctor: <strong>Dr. {{ appt.doctor.name }}</strong></p>
                    </div>
                    <div style="text-align: right;">
                        <span class="status-badge" style="padding: 5px 12px; border-radius: 20px; background: #d4edda; color: #155724; font-size: 11px;">{{ appt.status }}</span>
                    </div>
                </div>
            </div>
            {% empty %}
            <div style="padding: 40px; background: white; border-radius: 15px; border: 1px dashed #ccc;">
                <p style="color: #999; margin: 0;">Koi appointment nahi hai.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
