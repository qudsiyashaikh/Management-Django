{% extends 'base.html' %}

{% block content %}

<style>
    /* Header Container: Title aur Button ko ek line mein laane ke liye */
    .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    /* Naya Blue Button Style - Doctors list jaisa */
    .add-btn {
        background-color: #3498db;
        background-image: linear-gradient(to right, #3498db, #2980b9);
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .add-btn:hover {
        opacity: 0.9;
        color: white;
        transform: translateY(-1px);
    }

    /* Edit & Delete Buttons */
    .btn-edit {
        background-color: #f39c12;
        color: white;
        padding: 6px 15px;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
        display: inline-block;
        margin-right: 5px;
        transition: 0.3s;
    }

    .btn-delete {
        background-color: #e74c3c;
        color: white;
        padding: 6px 15px;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
        display: inline-block;
        transition: 0.3s;
    }

    .btn-edit:hover { background-color: #e67e22; color: white; }
    .btn-delete:hover { background-color: #c0392b; color: white; }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    table th {
        background: #2f3542;
        color: white;
        padding: 12px;
        text-align: left;
    }

    table td {
        padding: 12px;
        border-bottom: 1px solid #eee;
    }

    table tr:hover {
        background: #f8f9fa;
    }
</style>

<div style="padding: 20px;">
    <div class="header-container">
        <h2 style="margin: 0;">🧑‍🤝‍🧑 Patients List</h2>
        <a href="{% url 'add_patient' %}" class="add-btn">+ Add Patient</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Phone</th>
                <th>Disease</th>
                <th style="width: 180px;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for patient in patients %}
            <tr>
                <td>{{ patient.name }}</td>
                <td>{{ patient.age }}</td>
                <td>{{ patient.gender }}</td>
                <td>{{ patient.phone }}</td>
                <td>{{ patient.disease }}</td>
                <td>
                    <a href="{% url 'edit_patient' patient.id %}" class="btn-edit">Edit</a>
                    <a href="{% url 'delete_patient' patient.id %}" class="btn-delete" onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
